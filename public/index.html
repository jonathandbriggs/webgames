<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#14141f">
<title>Games</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    background:#14141f; color:#dfe3f0;
    font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
    touch-action:manipulation;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; padding:32px 20px;
  }
  h1 {
    font-size:15px; font-weight:800; letter-spacing:4px; text-transform:uppercase;
    background:linear-gradient(90deg, #e0762e, #4d96ff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  ul {
    list-style:none; display:grid; grid-template-columns:repeat(3, 1fr); gap:14px;
    width:100%; max-width:520px;
  }
  li {
    opacity:0; transform:scale(.9);
    animation:popIn .4s ease forwards;
  }
  li:nth-child(1) { animation-delay:.05s; }
  li:nth-child(2) { animation-delay:.15s; }
  li:nth-child(3) { animation-delay:.25s; }
  li:nth-child(4) { animation-delay:.35s; }
  li:nth-child(5) { animation-delay:.45s; }
  li:nth-child(6) { animation-delay:.55s; }
  @keyframes popIn { to { opacity:1; transform:scale(1); } }
  a {
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background:#20212f; color:#dfe3f0; text-decoration:none; text-align:center;
    border-radius:18px; padding:20px 8px; font-size:14px; font-weight:700;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    transition:transform .15s, background .15s, color .15s;
  }
  a .glyph { font-size:30px; }
  a:hover { background:#262838; color:#e0762e; }
  a:active { transform:scale(.96); }
  footer { color:#9aa1bd; font-size:13px; }
</style>
</head>
<body>
  <h1>Games</h1>
  <ul>
    <li><a href="untangle.html"><span class="glyph">🐍</span>Untangle</a></li>
    <li><a href="arrow-maze.html"><span class="glyph">➡️</span>Arrow Maze</a></li>
    <li><a href="hex-maze.html"><span class="glyph">⬡</span>Hex Maze</a></li>
    <li><a href="circuit.html"><span class="glyph">⚡</span>Circuit</a></li>
    <li><a href="gem-match.html"><span class="glyph">💎</span>Gem Match</a></li>
    <li><a href="flood-fill.html"><span class="glyph">🎨</span>Flood Fill</a></li>
  </ul>
  <footer>Deployed CI/CD style via Cloudflare Pages 🚀</footer>
</body>
</html>
