<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#14141f">
<title>Hex Maze</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background:#14141f; color:#dfe3f0;
    font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
    display:flex; flex-direction:column;
  }
  header {
    height:56px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; border-bottom:2px solid rgba(255,255,255,.07);
  }
  header .title { font-weight:800; letter-spacing:2px; font-size:14px; color:#666; text-transform:uppercase; }
  header .left { font-size:15px; color:#aaa; }
  header .left b { color:#dfe3f0; font-size:18px; }
  #newBtn {
    background:#e0762e; color:#fff; border:0; border-radius:10px;
    padding:8px 16px; font-size:15px; font-weight:700; cursor:pointer;
    box-shadow:0 3px 0 #b55a1c; touch-action:manipulation;
  }
  #newBtn:active { transform:translateY(2px); box-shadow:0 1px 0 #b55a1c; }
  #menuBtn {
    background:#26263a; color:#dfe3f0; border:0; border-radius:10px;
    padding:8px 14px; font-size:15px; font-weight:600; cursor:pointer;
    text-decoration:none; touch-action:manipulation;
  }
  #menuBtn:active { transform:scale(.94); }
  #stage { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #board { position:relative; touch-action:manipulation; }
  .tile {
    position:absolute;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.18);
    touch-action:none;
  }
  .tile svg { width:62%; height:62%; fill:rgba(255,255,255,.92); pointer-events:none; }
  .tile.gone { pointer-events:none; }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column; gap:14px;
    align-items:center; justify-content:center; text-align:center;
    background:rgba(8,8,14,.6); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .35s;
  }
  #overlay.show { opacity:1; pointer-events:auto; }
  #ovCard {
    background:#20212f; border-radius:22px; padding:34px 44px;
    box-shadow:0 12px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  #ovEmoji { font-size:64px; line-height:1; }
  #ovMsg { font-size:30px; font-weight:800; color:#fff; }
  #ovSub { font-size:15px; color:#9aa1bd; }
  #nextBtn {
    margin-top:8px; background:#e0762e; color:#fff; border:0; border-radius:14px;
    padding:13px 36px; font-size:19px; font-weight:800; cursor:pointer;
    box-shadow:0 4px 0 #b55a1c; touch-action:manipulation;
  }
  #nextBtn:active { transform:translateY(2px); box-shadow:0 2px 0 #b55a1c; }
  .confetti { position:fixed; top:-20px; width:10px; height:14px; border-radius:3px; pointer-events:none; z-index:50; }
</style>
</head>
<body>
<header>
  <a id="menuBtn" href="index.html">☰ Menu</a>
  <span class="title">Hex Maze</span>
  <span class="left"><b id="count">0</b> left</span>
  <button id="newBtn">↻ New</button>
</header>
<div id="stage"><div id="board"></div></div>
<div id="overlay">
  <div id="ovCard">
    <div id="ovEmoji">🎉</div>
    <div id="ovMsg">Cleared!</div>
    <div id="ovSub"></div>
    <button id="nextBtn">Next shape</button>
  </div>
</div>

<script>
"use strict";
// Hex directions: pointy-top grid, axial neighbors ordered by their real
// pixel angle (see hx()) so rotation = DIRS[d].angle lines up exactly with
// where the arrow actually travels.
const SQRT3 = Math.sqrt(3);
const DIRS = [
  {dx:1, dy:-1, angle:30},   // NE
  {dx:1, dy:0,  angle:90},   // E
  {dx:0, dy:1,  angle:150},  // SE
  {dx:-1,dy:1,  angle:210},  // SW
  {dx:-1,dy:0,  angle:270},  // W
  {dx:0, dy:-1, angle:330},  // NW
];

const ARROW_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2.5 L20 12.5 H15.4 V21 H8.6 V12.5 H4 Z"/></svg>';

const board = document.getElementById('board');
const countEl = document.getElementById('count');
const overlay = document.getElementById('overlay');
const statLine = document.getElementById('ovSub');

let cell = 0; // hex radius in px, computed dynamically
let grid = new Map();          // key -> arrow
let arrows = [];
let cols = 0, rows = 0;
let rowsH = 5, colsH = 7; // hex layout dimensions, computed dynamically
let left = 0, taps = 0, gameOver = false, hueBase = 0;

const key = (q, r) => r * 2000 + q;
const rnd = n => Math.floor(Math.random() * n);

/* ---------- shapes on normalized (-1..+1)^2 space ---------- */

function pointInPoly(pts, u, v) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const [xi, yi] = pts[i], [xj, yj] = pts[j];
    if ((yi > v) !== (yj > v) && u < (xj - xi) * (v - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

function ngonPts(n, r, startAng, innerR) {
  const pts = [];
  const count = innerR ? n * 2 : n;
  for (let k = 0; k < count; k++) {
    const ang = startAng + k * 2 * Math.PI / count;
    const rr = (innerR && k % 2) ? innerR : r;
    pts.push([rr * Math.cos(ang), rr * Math.sin(ang)]);
  }
  return pts;
}

const starPts = ngonPts(5, 1.08, -Math.PI / 2, 0.52);
const hexPts = ngonPts(6, 1.02, -Math.PI / 2);
const triPts = ngonPts(3, 1.02, Math.PI / 6);

const SHAPES = [
  { n:13, f:(u,v) => u*u + v*v <= 1.02 },                                   // circle
  { n:13, f:(u,v) => Math.abs(u) + Math.abs(v) <= 1.06 },                   // diamond
  { n:15, f:(u,v) => {                                                      // heart
    const x = u * 1.35, y = 0.12 - v * 1.3;
    const a = x*x + y*y - 1;
    return a*a*a - x*x*y*y*y <= 0;
  } },
  { n:15, f:(u,v) => pointInPoly(starPts, u, v) },                          // star
  { n:13, f:(u,v) => Math.abs(u) <= 0.36 || Math.abs(v) <= 0.36 },          // plus
  { n:13, f:(u,v) => pointInPoly(hexPts, u, v) },                           // hexagon
  { n:14, f:(u,v) => u*u + v*v <= 1 && (u-0.55)*(u-0.55) + v*v > 0.64 },    // crescent
];

/* ---------- rasterize onto hex grid ---------- */

function rasterize(shape, rowsH, colsH) {
  const cells = [];
  for (let r = 0; r < rowsH; r++) {
    // De-skew: shift the candidate q-range per row so the axial region
    // approximates a rectangle in real pixel space instead of a parallelogram.
    const qOff = Math.floor(r / 2);
    for (let q = -qOff; q < colsH - qOff; q++) {
      const px = SQRT3 * (q + r / 2), py = 1.5 * r;
      const u = px / (colsH * SQRT3 / 2) - 1;
      const v = py / (rowsH * 1.5 / 2) - 1;
      if (shape.f(u, v)) cells.push([q, r]);
    }
  }
  return cells;
}

// random symmetric blob via cellular-automata smoothing on hex grid
function blobCells(rowsH, colsH) {
  let g = Array.from({length:rowsH}, () => new Array(colsH).fill(0));
  const halfC = Math.floor((colsH - 1) / 2);
  for (let r = 0; r < rowsH; r++)
    for (let c = 0; c <= halfC; c++) {
      g[r][c] = g[r][colsH-1-c] = Math.random() < 0.56 ? 1 : 0;
    }
  for (let it = 0; it < 4; it++) {
    const ng = g.map(r => r.slice());
    for (let r = 0; r < rowsH; r++)
      for (let c = 0; c < colsH; c++) {
        let count = 0;
        for (const {dx, dy} of DIRS) {
          const nc = c + dx, nr = r + dy;
          if (nc >= 0 && nc < colsH && nr >= 0 && nr < rowsH) count += g[nr][nc];
        }
        ng[r][c] = count >= 4 ? 1 : (count === 3 ? g[r][c] : 0);
      }
    g = ng;
  }
  const cells = [];
  for (let r = 0; r < rowsH; r++)
    for (let c = 0; c < colsH; c++)
      if (g[r][c]) cells.push([c, r]);
  return cells;
}

function largestComponent(cells) {
  const set = new Set(cells.map(([q,r]) => key(q,r)));
  const seen = new Set();
  let best = [];
  for (const [q, r] of cells) {
    const k0 = key(q, r);
    if (seen.has(k0)) continue;
    const comp = [], stack = [[q, r]];
    seen.add(k0);
    while (stack.length) {
      const [cq, cr] = stack.pop();
      comp.push([cq, cr]);
      for (const d of DIRS) {
        const nk = key(cq + d.dx, cr + d.dy);
        if (set.has(nk) && !seen.has(nk)) { seen.add(nk); stack.push([cq + d.dx, cr + d.dy]); }
      }
    }
    if (comp.length > best.length) best = comp;
  }
  return best;
}

function crop(cells) {
  let minQ = Infinity, minR = Infinity, maxQ = -Infinity, maxR = -Infinity;
  for (const [q, r] of cells) {
    minQ = Math.min(minQ, q); maxQ = Math.max(maxQ, q);
    minR = Math.min(minR, r); maxR = Math.max(maxR, r);
  }
  return {
    cols: maxQ - minQ + 1,
    rows: maxR - minR + 1,
    cells: cells.map(([q, r]) => [q - minQ, r - minR]),
  };
}

/* ---------- solvable direction assignment ----------
   Build in reverse removal order: each arrow gets a direction whose ray
   is clear of all arrows placed so far. Since removing an arrow can only
   free paths (never block them), any player order stays solvable. */

function assignDirections(cells) {
  const remaining = new Set(cells.map(([q, r]) => key(q, r)));
  const cellOf = new Map(cells.map(([q, r]) => [key(q, r), [q, r]]));
  const dirOf = new Map();
  while (remaining.size) {
    const options = [];
    for (const k of remaining) {
      const [q, r] = cellOf.get(k);
      const clear = [];
      for (let d = 0; d < 6; d++) {
        const {dx, dy} = DIRS[d];
        let cq = q + dx, cr = r + dy, ok = true;
        while (cq >= 0 && cq < cols && cr >= 0 && cr < rows) {
          if (remaining.has(key(cq, cr)) && key(cq, cr) !== k) { ok = false; break; }
          cq += dx; cr += dy;
        }
        if (ok) clear.push(d);
      }
      if (clear.length) options.push([k, clear]);
    }
    const [k, clear] = options[rnd(options.length)];
    dirOf.set(k, clear[rnd(clear.length)]);
    remaining.delete(k);
  }
  return dirOf;
}

/* ---------- game ---------- */

function newGame() {
  overlay.classList.remove('show');
  board.innerHTML = '';
  grid = new Map(); arrows = []; taps = 0; gameOver = false;
  hueBase = rnd(360);

  let cells = [];
  for (let tries = 0; tries < 25 && cells.length < 40; tries++) {
    const raw = Math.random() < 0.3 ? blobCells(rowsH, colsH) : rasterize(SHAPES[rnd(SHAPES.length)], rowsH, colsH);
    const found = largestComponent(raw);
    if (found.length > cells.length) cells = found;
  }
  const shape = crop(cells);
  cols = shape.cols; rows = shape.rows;

  // Hex layout dimensions (in hex-radii)
  rowsH = Math.max(3, rows);
  colsH = Math.max(5, Math.ceil(cols * 2 / 3));

  const dirOf = assignDirections(shape.cells);
  for (const [q, r] of shape.cells) {
    const a = { q, r, dir: dirOf.get(key(q, r)), el: document.createElement('div') };
    a.el.className = 'tile';
    a.el.innerHTML = ARROW_SVG;
    a.el.firstChild.style.transform = `rotate(${DIRS[a.dir].angle}deg)`;
    const hue = (hueBase + (q + r) / (cols + rows) * 300) % 360;
    a.el.style.background = `hsl(${hue} 68% 60%)`;
    const onTap = e => { e.preventDefault(); tap(a); };
    a.el.addEventListener('touchstart', onTap);
    a.el.addEventListener('mousedown', onTap);
    grid.set(key(q, r), a);
    arrows.push(a);
    board.appendChild(a.el);
  }

  // staggered pop-in with delay based on hex index
  const idx = (q, r) => r * colsH + Math.floor(q / 2);
  for (const a of arrows) {
    a.animating = true;
    const anim = a.el.animate(
      [{ transform:'scale(0)', opacity:0 }, { transform:'scale(1)', opacity:1 }],
      { duration:260, delay:(idx(a.q, a.r)) * 8 + (a.dir % 2) * 40, easing:'cubic-bezier(.34,1.56,.64,1)', fill:'backwards' });
    anim.onfinish = () => { a.animating = false; };
  }

  left = arrows.length;
  countEl.textContent = left;
  layout();
}

/* hexagonal pixel layout: pointy-top axial → pixel, returns hex CENTER */
function hx(q, r) {
  return { x: cell * SQRT3 * (q + r / 2), y: cell * 1.5 * r };
}

function layout() {
  const stage = document.getElementById('stage');
  let w = stage.clientWidth - 20, h = stage.clientHeight - 20;
  if (w <= 0 || h <= 0) {
    w = window.innerWidth - 20;
    h = window.innerHeight - 56 - 20;
  }

  // Measure the board's extent at a reference cell size, then scale to fit the stage.
  const REF = 100;
  cell = REF;
  const halfW = REF * SQRT3 / 2, halfH = REF; // hex bounding-box half-extents
  let minX = -halfW, maxX = halfW, minY = -halfH, maxY = halfH;
  if (arrows.length) {
    minX = minY = Infinity; maxX = maxY = -Infinity;
    for (const a of arrows) {
      const p = hx(a.q, a.r);
      minX = Math.min(minX, p.x - halfW); maxX = Math.max(maxX, p.x + halfW);
      minY = Math.min(minY, p.y - halfH); maxY = Math.max(maxY, p.y + halfH);
    }
  }
  const spanX = maxX - minX, spanY = maxY - minY;

  cell = Math.max(14, Math.min(65, Math.floor(Math.min(w / spanX, h / spanY) * REF)));
  const scale = cell / REF;

  board.style.width = w + 'px';
  board.style.height = h + 'px';

  const tileW = cell * SQRT3, tileH = cell * 2;
  const padX = Math.max(3, Math.round(tileW * 0.07));
  const padY = Math.max(3, Math.round(tileH * 0.05));
  const offX = (w - spanX * scale) / 2 - minX * scale;
  const offY = (h - spanY * scale) / 2 - minY * scale;

  for (const a of arrows) {
    const p = hx(a.q, a.r); // recomputed at the final `cell`
    a.el.style.width = (tileW - padX * 2) + 'px';
    a.el.style.height = (tileH - padY * 2) + 'px';
    a.el.style.left = (p.x - tileW / 2 + offX + padX) + 'px';
    a.el.style.top = (p.y - tileH / 2 + offY + padY) + 'px';
  }
}

function tap(a) {
  if (gameOver || a.animating || !grid.has(key(a.q, a.r))) return;
  taps++;
  const {dx, dy} = DIRS[a.dir];
  let cq = a.q + dx, cr = a.r + dy, free = 0, blocker = null;
  while (cq >= 0 && cq < cols && cr >= 0 && cr < rows) {
    blocker = grid.get(key(cq, cr));
    if (blocker) break;
    free++; cq += dx; cr += dy;
  }
  if (!blocker) fly(a, free);
  else bounce(a, free, blocker);
}

function fly(a, free) {
  grid.delete(key(a.q, a.r));
  a.el.classList.add('gone');
  left--; countEl.textContent = left;
  const {dx, dy} = DIRS[a.dir];
  // project to pixel direction of movement
  const pStart = hx(a.q, a.r);
  const pEnd = hx(a.q + dx, a.r + dy);
  const dpx = pEnd.x - pStart.x;
  const dpy = pEnd.y - pStart.y;

  // animate along the hex direction vector (unit vector)
  const dist = Math.hypot(dpx, dpy) || 1;
  const vecX = dpx / dist;
  const vecY = dpy / dist;
  const totalD = (free + cols + rows) * cell;

  a.el.style.willChange = 'transform, opacity';
  const anim = a.el.animate(
    [{ transform:'translate(0,0)', opacity:1 },
     { transform:`translate(${vecX * totalD}px, ${vecY * totalD}px)`, opacity:0.4 }],
    { duration:380, easing:'cubic-bezier(.45,0,1,1)', fill:'forwards' });
  anim.onfinish = () => { a.el.style.willChange = ''; a.el.remove(); };
  if (left === 0) win();
}

function bounce(a, free, blocker) {
  a.animating = true;
  const pStart = hx(a.q, a.r);
  const pEnd = hx(a.q + DIRS[a.dir].dx, a.r + DIRS[a.dir].dy);
  const ddx = pEnd.x - pStart.x, ddy = pEnd.y - pStart.y;
  const dist = Math.hypot(ddx, ddy) || 1;
  const vecX = ddx / dist;
  const vecY = ddy / dist;
  const d = free * cell * 0.5;

  a.el.style.willChange = 'transform, opacity';
  const anim = a.el.animate(
    [{ transform:'translate(0,0)' },
     { transform:`translate(${vecX * d}px, ${vecY * d}px)`, offset:0.6, easing:'cubic-bezier(0,0,.7,1)' },
     { transform:'translate(0,0)' }],
    { duration:240 + free * 80, easing:'ease-out' });
  anim.onfinish = () => { a.el.style.willChange = ''; a.animating = false; };

  blocker.el.animate(
    [{ transform:'translate(0,0)' },
     { transform:`translate(${vecX * cell * 0.15}px, ${vecY * cell * 0.15}px)` },
     { transform:'translate(0,0)' }],
    { duration:180, delay:(240 + free * 80) * 0.45, easing:'ease-out' });
}

function win() {
  gameOver = true;
  statLine.textContent = `${taps} taps`;
  setTimeout(() => overlay.classList.add('show'), 350);
  confetti();
}

function confetti() {
  for (let i = 0; i < 70; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = `hsl(${rnd(360)} 80% 60%)`;
    document.body.appendChild(c);
    c.animate(
      [{ transform:'translateY(0) rotate(0deg)', opacity:1 },
       { transform:`translateY(${innerHeight + 60}px) rotate(${540 + rnd(720)}deg) translateX(${rnd(120) - 60}px)`, opacity:0.7 }],
      { duration:1400 + rnd(1400), delay:rnd(500), easing:'cubic-bezier(.3,.4,.6,1)', fill:'forwards' }
    ).onfinish = () => c.remove();
  }
}

document.getElementById('newBtn').addEventListener('click', newGame);
document.getElementById('nextBtn').addEventListener('click', newGame);
window.addEventListener('resize', layout);
document.addEventListener('contextmenu', e => e.preventDefault());

newGame();
</script>


</body></html>
