<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f0f23">
<title>Gem Match</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background:#0f0f23; color:#dfe3f0;
    font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
    display:flex; flex-direction:column;
  }
  header {
    height:56px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 12px; border-bottom:2px solid rgba(255,255,255,.07);
  }
  header .title { font-weight:800; letter-spacing:2px; font-size:14px; color:#666; text-transform:uppercase; }
  header .left { font-size:14px; color:#aaa; display:flex; gap:14px; align-items:center; }
  header .left b { color:#dfe3f0; font-size:17px; }
  #newBtn {
    background:#e0762e; color:#fff; border:0; border-radius:10px;
    padding:8px 12px; font-size:14px; font-weight:700; cursor:pointer;
    box-shadow:0 3px 0 #b55a1c; touch-action:manipulation;
  }
  #newBtn:active { transform:translateY(2px); box-shadow:0 1px 0 #b55a1c; }
  #menuBtn {
    background:#262138; color:#dfe3f0; border:0; border-radius:10px;
    padding:8px 12px; font-size:14px; font-weight:600; cursor:pointer;
    text-decoration:none; touch-action:manipulation;
  }
  #menuBtn:active { transform:scale(.94); }
  #stage { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  canvas { touch-action:manipulation; cursor:pointer; border-radius:16px; background:#181830; box-shadow:0 0 40px rgba(120,60,255,.15), inset 0 1px 0 rgba(255,255,255,.04); }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column; gap:14px;
    align-items:center; justify-content:center; text-align:center;
    background:rgba(8,8,16,.7); backdrop-filter:blur(4px);
    opacity:0; pointer-events:none; transition:opacity .35s ease; z-index:10;
  }
  #overlay.show { opacity:1; pointer-events:auto; }
  #ovCard {
    background:#2a2a48; border-radius:24px; padding:40px 56px;
    box-shadow:0 16px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
    display:flex; flex-direction:column; align-items:center; gap:14px; min-width:320px;
  }
  #ovEmoji { font-size:72px; line-height:1; }
  #ovMsg { font-size:32px; font-weight:800; color:#fff; letter-spacing:.5px; }
  #ovSub { font-size:16px; color:#9aa1c4; }
  .btn-primary {
    margin-top:10px; background:#e0762e; color:#fff; border:0; border-radius:14px;
    padding:13px 38px; font-size:17px; font-weight:800; cursor:pointer;
    box-shadow:0 4px 0 #b55a1c; touch-action:manipulation; transition:transform .1s;
  }
  .btn-primary:active { transform:translateY(2px); box-shadow:0 2px 0 #b55a1c; }
  #comboPopup {
    position:fixed; pointer-events:none; z-index:5;
    font-weight:900; font-size:34px; color:#FFD700; text-shadow:0 2px 12px rgba(0,0,0,.7);
    opacity:0; transform:translate(-50%, -50%);
  }
</style>
</head>
<body>
<header>
  <a id="menuBtn" href="index.html">☰</a>
  <span class="title">Gem Match <span id="level" style="color:#e0762e"></span></span>
  <div class="left">
    <span><b id="score">0</b>/<b id="target">1000</b></span>
    <span><b id="moves">20</b><small> moves</small></span>
    <button id="newBtn" onclick="gemMatchStart()">↻</button>
  </div>
</header>
<div id="stage"><canvas id="cv"></canvas></div>
<div id="comboPopup">2×</div>
<div id="overlay" class="show">
  <div id="ovCard">
    <div id="ovEmoji">💎</div>
    <div id="ovMsg">Gem Match</div>
    <div id="ovSub">Swap gems to match 3+. Reach the target before moves run out!</div>
    <button class="btn-primary" id="ovBtn" onclick="gemMatchStart()">▶ Start</button>
  </div>
</div>

<script>
"use strict";
// Gem Match — tap a gem, tap an adjacent gem to swap. Matches of 3+ in a row
// or column clear; gravity drops gems and refills fall from the top, so
// clears can cascade with a rising combo multiplier. Reach the score target
// within the move limit to win the level.

const COLS = 8, ROWS = 7;
const GEM_TYPES = 6;
const MATCH_MIN = 3;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const comboPopup = document.getElementById('comboPopup');

const GEM_COLORS = [
  { bg:'#FF4D6A', fg:'#F85C78', glow:'rgba(255,77,106,.35)' },   // Red/Pink
  { bg:'#5AC8FA', fg:'#74D4FF', glow:'rgba(90,200,250,.35)' },   // Blue/Cyan
  { bg:'#FFB64C', fg:'#FFE08A', glow:'rgba(255,182,76,.35)' },   // Orange/Gold
  { bg:'#7AE1AF', fg:'#9CEEBE', glow:'rgba(122,225,175,.35)' },  // Green/Mint
  { bg:'#A680FF', fg:'#BDAFFF', glow:'rgba(166,128,255,.35)' },  // Purple/Violet
  { bg:'#FF79D6', fg:'#FF9CE0', glow:'rgba(255,121,214,.35)' },  // Rose/HotPink
];
const GEM_ICONS = ['💎','🔮','✨','🌟','🪻','👑'];

// ── State ──────────────────────────────────────────────────────────────
let levelIdx = +localStorage.getItem('gemMatchLevel') || 1;
let cell = 0;
let grid = [];        // [y][x] = gem object or null
let dying = [];       // gems animating out after a match
let particles = [];
let score = 0, targetScore = 0, movesLeft = 0;
let combo = 0;
let sel = null;       // {x, y} selected cell
let hov = null;       // {x, y} cell under a hovering pen/mouse
let swapPair = null;  // [{x,y},{x,y}] cells of the in-flight swap
let state = 'over';   // idle | swap | swapback | pop | fall | over
let popT = 0;

function rnd(n) { return Math.floor(Math.random() * n); }

function makeGem(type, x, rowY) {
  return { type, px: x * cell, py: rowY * cell, tx: x * cell, ty: rowY * cell, scale: 1, alpha: 1 };
}

// ── Layout ─────────────────────────────────────────────────────────────
function layout() {
  const stage = document.getElementById('stage');
  const w = stage.clientWidth - 16, h = stage.clientHeight - 16;
  cell = Math.max(24, Math.floor(Math.min(w / COLS, h / ROWS)));
  const bw = COLS * cell, bh = ROWS * cell;
  const dpr = window.devicePixelRatio || 1;
  cv.style.width = bw + 'px';
  cv.style.height = bh + 'px';
  cv.width = Math.round(bw * dpr);
  cv.height = Math.round(bh * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const g = grid[y] && grid[y][x];
    if (g) { g.px = g.tx = x * cell; g.py = g.ty = y * cell; }
  }
}
window.addEventListener('resize', layout);

// ── Board generation ───────────────────────────────────────────────────
function pickType(x, y) {
  // avoid creating a match with the already-filled cells to the left/above
  let t;
  do { t = rnd(GEM_TYPES); }
  while ((x >= 2 && typeAt(x-1,y) === t && typeAt(x-2,y) === t) ||
         (y >= 2 && typeAt(x,y-1) === t && typeAt(x,y-2) === t));
  return t;
}

function buildBoard() {
  grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    grid[y][x] = makeGem(pickType(x, y), x, y - ROWS - 1); // start above board, fall in
    grid[y][x].ty = y * cell;
  }
  if (!hasAnyMove()) reshuffle();
}

function reshuffle() {
  // ponytail: retry-until-valid; at 8x7 with 6 types this converges immediately
  do {
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) grid[y][x].type = -1;
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
      grid[y][x].type = pickType(x, y);
      grid[y][x].scale = 0.2;
    }
  } while (!hasAnyMove());
}

// ── Match logic ────────────────────────────────────────────────────────
function typeAt(x, y) { const g = grid[y][x]; return g ? g.type : -1; }

function matchAt(x, y) {
  const t = typeAt(x, y);
  if (t < 0) return false;
  let n = 1;
  for (let i = x-1; i >= 0 && typeAt(i,y) === t; i--) n++;
  for (let i = x+1; i < COLS && typeAt(i,y) === t; i++) n++;
  if (n >= MATCH_MIN) return true;
  n = 1;
  for (let j = y-1; j >= 0 && typeAt(x,j) === t; j--) n++;
  for (let j = y+1; j < ROWS && typeAt(x,j) === t; j++) n++;
  return n >= MATCH_MIN;
}

function findAllMatches() {
  const matched = new Set();
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; ) {
      const t = typeAt(x, y);
      let len = 1;
      while (t >= 0 && x + len < COLS && typeAt(x+len, y) === t) len++;
      if (t >= 0 && len >= MATCH_MIN) for (let i = 0; i < len; i++) matched.add((y)*COLS + x+i);
      x += len;
    }
  }
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; ) {
      const t = typeAt(x, y);
      let len = 1;
      while (t >= 0 && y + len < ROWS && typeAt(x, y+len) === t) len++;
      if (t >= 0 && len >= MATCH_MIN) for (let i = 0; i < len; i++) matched.add((y+i)*COLS + x);
      y += len;
    }
  }
  return matched;
}

function hasAnyMove() {
  // ponytail: brute-force every adjacent swap; 2*8*7 checks is nothing
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    for (const [dx, dy] of [[1,0],[0,1]]) {
      const x2 = x + dx, y2 = y + dy;
      if (x2 >= COLS || y2 >= ROWS) continue;
      [grid[y][x], grid[y2][x2]] = [grid[y2][x2], grid[y][x]];
      const ok = matchAt(x, y) || matchAt(x2, y2);
      [grid[y][x], grid[y2][x2]] = [grid[y2][x2], grid[y][x]];
      if (ok) return true;
    }
  }
  return false;
}

// ── Input ──────────────────────────────────────────────────────────────
cv.addEventListener('pointerdown', evt => {
  if (state !== 'idle') return;
  const rect = cv.getBoundingClientRect();
  const gx = Math.floor((evt.clientX - rect.left) / cell);
  const gy = Math.floor((evt.clientY - rect.top) / cell);
  if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) { sel = null; return; }
  if (!sel) { sel = { x: gx, y: gy }; return; }
  if (sel.x === gx && sel.y === gy) { sel = null; return; }
  if (Math.abs(gx - sel.x) + Math.abs(gy - sel.y) === 1) {
    startSwap(sel.x, sel.y, gx, gy);
    sel = null;
  } else {
    sel = { x: gx, y: gy };
  }
});

cv.addEventListener('pointermove', evt => {
  if (evt.pointerType === 'touch') return;
  const rect = cv.getBoundingClientRect();
  const gx = Math.floor((evt.clientX - rect.left) / cell);
  const gy = Math.floor((evt.clientY - rect.top) / cell);
  hov = (gx >= 0 && gy >= 0 && gx < COLS && gy < ROWS) ? { x: gx, y: gy } : null;
});
cv.addEventListener('pointerleave', () => { hov = null; });

function startSwap(x1, y1, x2, y2) {
  swapPair = [{ x: x1, y: y1 }, { x: x2, y: y2 }];
  doSwap();
  state = 'swap';
}

function doSwap() {
  const [a, b] = swapPair;
  [grid[a.y][a.x], grid[b.y][b.x]] = [grid[b.y][b.x], grid[a.y][a.x]];
  grid[a.y][a.x].tx = a.x * cell; grid[a.y][a.x].ty = a.y * cell;
  grid[b.y][b.x].tx = b.x * cell; grid[b.y][b.x].ty = b.y * cell;
}

// ── Resolve / gravity ──────────────────────────────────────────────────
function resolve(matched) {
  combo++;
  score += (matched.size - 2) * 50 * combo;
  updateHUD();
  if (combo >= 2) showComboPopup(combo + '×');
  for (const idx of matched) {
    const x = idx % COLS, y = Math.floor(idx / COLS);
    const g = grid[y][x];
    grid[y][x] = null;
    dying.push(g);
    particles.push(...createSparkles(g.px + cell/2, g.py + cell/2));
  }
  popT = 14;
  state = 'pop';
}

function applyGravity() {
  for (let x = 0; x < COLS; x++) {
    const stack = [];
    for (let y = ROWS - 1; y >= 0; y--) if (grid[y][x]) stack.push(grid[y][x]);
    let spawn = 0;
    for (let y = ROWS - 1, i = 0; y >= 0; y--, i++) {
      const g = i < stack.length ? stack[i] : makeGem(rnd(GEM_TYPES), x, -(++spawn));
      grid[y][x] = g;
      g.tx = x * cell; g.ty = y * cell;
    }
  }
}

function endOfMove() {
  if (score >= targetScore) {
    levelIdx++;
    localStorage.setItem('gemMatchLevel', String(levelIdx));
    showOverlay('🏆', 'Level Complete!', `Score: ${score}`, '▶ Next Level');
  } else if (movesLeft <= 0) {
    showOverlay('😵', 'Out of Moves', `Score: ${score} / ${targetScore}`, '↻ Try Again');
  } else {
    if (!hasAnyMove()) reshuffle();
    state = 'idle';
  }
}

// ── HUD / overlay ──────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('target').textContent = targetScore;
  document.getElementById('moves').textContent = movesLeft;
  document.getElementById('level').textContent = 'Lv' + levelIdx;
}

function showComboPopup(text) {
  comboPopup.textContent = text;
  const rect = cv.getBoundingClientRect();
  comboPopup.style.left = (rect.left + rect.width / 2) + 'px';
  comboPopup.style.top = (rect.top + rect.height * 0.35) + 'px';
  comboPopup.animate(
    [{ opacity: 0, transform: 'translate(-50%,-50%) scale(.6)' },
     { opacity: 1, transform: 'translate(-50%,-70%) scale(1.15)', offset: 0.3 },
     { opacity: 0, transform: 'translate(-50%,-110%) scale(1)' }],
    { duration: 900, easing: 'ease-out' });
}

function showOverlay(emoji, msg, sub, btn) {
  state = 'over';
  document.getElementById('ovEmoji').textContent = emoji;
  document.getElementById('ovMsg').textContent = msg;
  document.getElementById('ovSub').textContent = sub;
  document.getElementById('ovBtn').textContent = btn;
  overlay.classList.add('show');
}

function gemMatchStart() {
  overlay.classList.remove('show');
  // ponytail: tuning knobs — bump these if levels feel too easy/hard
  targetScore = Math.min(1000 + (levelIdx - 1) * 300, 8000);
  movesLeft = 20;
  score = 0; combo = 0; sel = null;
  dying = []; particles = [];
  updateHUD();
  buildBoard();
  layout();
  state = 'fall';
}

// ── Particles ──────────────────────────────────────────────────────────
function createSparkles(x, y) {
  const count = rnd(6) + 4;
  const colors = ['#fff','#FFD700','#FF69B4','#8A2BE2','#00CED1'];
  const out = [];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = rnd(3) + 2;
    out.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 1.0, decay: rnd(25)+15, size: rnd(3)+2, color: colors[rnd(colors.length)],
    });
  }
  return out;
}

// ── Render ─────────────────────────────────────────────────────────────
function drawGem(g, wob) {
  const cx = g.px + cell/2, cy = g.py + cell/2 + wob;
  const r = cell * 0.42 * g.scale;
  if (r < 1 || g.alpha <= 0.02) return;
  ctx.save();
  ctx.globalAlpha = g.alpha;
  ctx.translate(cx, cy);
  ctx.shadowColor = GEM_COLORS[g.type].glow;
  ctx.shadowBlur = 10;
  const c = GEM_COLORS[g.type];
  const grad = ctx.createRadialGradient(0, -r*0.3, r*0.15, 0, 0, r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.2, c.fg);
  grad.addColorStop(0.6, c.bg);
  grad.addColorStop(1, '#3a1a5c');
  ctx.beginPath();
  ctx.roundRect(-r, -r, r*2, r*2, r * 0.48);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.font = `${Math.floor(r * 1.1)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GEM_ICONS[g.type], 0, 1);
  ctx.restore();
}

function drawParticle(p) {
  const size = p.size * (0.5 + p.life);
  ctx.save();
  ctx.globalAlpha = Math.max(0, p.life);
  ctx.fillStyle = p.color;
  const s = size / 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x - s, p.y);
  ctx.lineTo(p.x, p.y - s);
  ctx.lineTo(p.x + s, p.y);
  ctx.lineTo(p.x, p.y + s);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ── Main loop ──────────────────────────────────────────────────────────
function tick() {
  requestAnimationFrame(tick);
  if (!grid.length) return;

  // advance sprites toward targets
  let settled = true;
  const now = Date.now() / 900;
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const g = grid[y][x];
    if (!g) continue;
    const dx = g.tx - g.px, dy = g.ty - g.py;
    if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
      g.px += dx * 0.22;
      g.py += dy * 0.22;
      settled = false;
    } else { g.px = g.tx; g.py = g.ty; }
    if (g.scale < 1) { g.scale = Math.min(1, g.scale + (1 - g.scale) * 0.18 + 0.01); settled = false; }
  }
  for (const g of dying) { g.scale *= 0.86; g.alpha *= 0.82; }
  dying = dying.filter(g => g.alpha > 0.03);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08;
    p.life -= p.decay / 900;
  }
  particles = particles.filter(p => p.life > 0);

  // draw
  ctx.clearRect(0, 0, COLS * cell, ROWS * cell);
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const g = grid[y][x];
    if (g) drawGem(g, Math.sin(now + x * 1.3 + y * 2.1) * 1.2);
  }
  for (const g of dying) drawGem(g, 0);
  for (const p of particles) drawParticle(p);
  if (hov && state === 'idle' && !(sel && sel.x === hov.x && sel.y === hov.y)) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(hov.x * cell + 3, hov.y * cell + 3, cell - 6, cell - 6, 10);
    ctx.stroke();
    ctx.restore();
  }
  if (sel && state === 'idle') {
    const pulse = 2 + Math.sin(Date.now() / 200) * 1.5;
    ctx.save();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.roundRect(sel.x * cell + pulse, sel.y * cell + pulse, cell - pulse*2, cell - pulse*2, 10);
    ctx.stroke();
    ctx.restore();
  }

  // state transitions
  if (state === 'swap' && settled) {
    const matched = findAllMatches();
    if (matched.size) {
      movesLeft--; combo = 0;
      updateHUD();
      swapPair = null;
      resolve(matched);
    } else {
      doSwap(); // revert
      swapPair = null;
      state = 'swapback';
    }
  } else if (state === 'swapback' && settled) {
    state = 'idle';
  } else if (state === 'pop') {
    if (--popT <= 0) { applyGravity(); state = 'fall'; }
  } else if (state === 'fall' && settled) {
    const matched = findAllMatches();
    if (matched.size) resolve(matched); // cascade!
    else endOfMove();
  }
}

// ── Start ──────────────────────────────────────────────────────────────
targetScore = Math.min(1000 + (levelIdx - 1) * 300, 8000);
movesLeft = 20;
updateHUD();
buildBoard();
layout();
state = 'over'; // wait behind the start overlay; board is visible
tick();
</script>
</body>
</html>
