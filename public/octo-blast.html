<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#14141f">
<title>Octo Blast</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background:#14141f; color:#dfe3f0;
    font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
    display:flex; flex-direction:column;
  }
  header {
    height:56px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; border-bottom:2px solid rgba(255,255,255,.07);
  }
  .header-center { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .title { font-weight:800; letter-spacing:2px; font-size:14px; color:#666; text-transform:uppercase; }
  #levelLabel { font-weight:800; font-size:18px; color:#aab2d0; letter-spacing:1px; }
  #restartBtn {
    background:none; border:2px solid rgba(255,255,255,.18); color:#dfe3f0;
    border-radius:10px; padding:6px 12px; font-size:16px; font-weight:700; cursor:pointer;
    touch-action:manipulation;
  }
  #restartBtn:active { transform:scale(.94); }
  #menuBtn {
    background:none; border:2px solid rgba(255,255,255,.18); color:#dfe3f0;
    border-radius:10px; padding:6px 12px; font-size:16px; font-weight:700; cursor:pointer;
    text-decoration:none; touch-action:manipulation;
  }
  #menuBtn:active { transform:scale(.94); }
  #stage { flex:1; position:relative; overflow:hidden; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column; gap:14px;
    align-items:center; justify-content:center; text-align:center;
    background:rgba(8,8,14,.6); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .35s;
  }
  #overlay.show { opacity:1; pointer-events:auto; }
  #ovCard {
    background:#20212f; border-radius:22px; padding:34px 44px;
    box-shadow:0 12px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  #ovEmoji { font-size:64px; line-height:1; }
  #ovMsg { font-size:30px; font-weight:800; color:#fff; }
  #ovSub { font-size:15px; color:#9aa1bd; max-width:280px; }
  #ovBtn {
    margin-top:8px; background:#e0762e; color:#fff; border:0; border-radius:14px;
    padding:13px 36px; font-size:19px; font-weight:800; cursor:pointer;
    box-shadow:0 4px 0 #b55a1c; touch-action:manipulation;
  }
  #ovBtn:active { transform:translateY(2px); box-shadow:0 2px 0 #b55a1c; }
</style>
</head>
<body>
<header>
  <a id="menuBtn" href="index.html">☰</a>
  <div class="header-center">
    <span class="title">Octo Blast</span>
    <div id="levelLabel">Level 1</div>
  </div>
  <button id="restartBtn">↻</button>
</header>
<div id="stage"><canvas id="cv"></canvas></div>
<div id="overlay">
  <div id="ovCard">
    <div id="ovEmoji">🐙</div>
    <div id="ovMsg">Wall Cleared!</div>
    <div id="ovSub"></div>
    <button id="ovBtn">Next Level</button>
  </div>
</div>

<script>
"use strict";

/* ---------- helpers ---------- */
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function shade(hex, t) { // t>0 lighten toward white, t<0 darken toward black
  const n = parseInt(hex.slice(1), 16), r = n >> 16 & 255, g = n >> 8 & 255, b = n & 255;
  const m = c => Math.round(t >= 0 ? c + (255 - c) * t : c * (1 + t));
  return `rgb(${m(r)},${m(g)},${m(b)})`;
}
const easeInOut = t => t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

/* ---------- pixel-art patterns (16x16, '#' = accent) ---------- */
const PATTERNS = [
[ // heart
"................",
"................",
"..###......###..",
".#####....#####.",
"#######..#######",
"################",
"################",
"################",
".##############.",
".##############.",
"..############..",
"...##########...",
".....######.....",
"......####......",
".......##.......",
"................"],
[ // butterfly
"................",
".###........###",
"#####......####.",
"#######...#####.",
".########.#####.",
".########.####..",
"..############..",
"....##.##.##....",
"....##.##.##....",
"..############..",
".########.####..",
".########.#####.",
"#######...#####.",
"#####......####.",
".###........###",
"................"],
[ // star
".......##.......",
".......##.......",
"......####......",
"......####......",
".....######.....",
"################",
".##############.",
"..############..",
"...##########...",
"....########....",
"....########....",
"...####..####...",
"...###....###...",
"..##........##..",
"..#..........#..",
"................"],
[ // space invader
"................",
"...#........#...",
"....#......#....",
"...##########...",
"..##.######.##..",
".##############.",
"#.############.#",
"#.############.#",
"#.############.#",
"#..##########..#",
"...##########...",
"....##....##....",
"...##......##...",
"..##........##..",
".##..........##.",
"................"],
[ // flower
"......####......",
".....######.....",
"..##.######.##..",
".####.####.####.",
".#####.##.#####.",
"..#####..#####..",
"....###..###....",
"##.....##.....##",
"##.....##.....##",
"....###..###....",
"..#####..#####..",
".#####.##.#####.",
".####.####.####.",
"..##.######.##..",
".....######.....",
"......####......"],
[ // diamond
".......##.......",
"......####......",
".....######.....",
"....########....",
"...##########...",
"..############..",
".##############.",
"################",
"################",
".##############.",
"..############..",
"...##########...",
"....########....",
".....######.....",
"......####......",
".......##......."],
];

const BG = '#3b3d49';
const GOLD_HEX = '#f7b733';
const ACCENTS = ['#ff2e88','#22d3a7','#f5f6fa','#4d96ff','#b866ff','#ff5c4d'];

/* ---------- dom ---------- */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
const overlay = document.getElementById('overlay');
const ovEmoji = document.getElementById('ovEmoji');
const ovMsg = document.getElementById('ovMsg');
const ovSub = document.getElementById('ovSub');
const ovBtn = document.getElementById('ovBtn');
const levelLabel = document.getElementById('levelLabel');

/* ---------- state ---------- */
let level = Math.max(1, parseInt(localStorage.getItem('octoBlastLevel')) || 1);
let cols, rows, colors, goldIdx, remaining, colorLeft;
let stacks;                      // stacks[c] = [{ci, sh}, ...] bottom first — bricks fall to fill
let claimedN, dropOff, dropVel;  // per column: in-flight claims, gravity drop animation
let lanes, active, rngQ;         // lanes: one octopus column per color; active: octopi on / flying to pads
let pads;                        // pad index -> active octo or null
let coins, over;                 // over: '', 'win', 'lose'
let stuckT = 0, coinFlash = 0;
let balls = [], particles = [], confetti = [];
let W = 0, H = 0, dpr = 1;
let bw, bd, bf, wallX, baseY;    // baseY: fixed y of the eating line (bottom of every stack)
let padY, padR, padXs = [];
let laneTop, laneXs = [], laneStep, octoR;
let rafId = 0, lastT = 0;

const PAD_COUNT = 5;
const LANE_LEN = 4;
const FIRE_INTERVAL = 0.11;
const BALL_SPEED = 950;
const DROP_G = 3000;             // px/s^2 — stacks thump down fast
const GOLD_COINS = 6;
const START_COINS = 140;

/* ---------- level generation ---------- */
function genLevel() {
  const rng = mulberry32(level * 7919 + 13);
  rngQ = mulberry32(level * 104729 + 7);
  // keep the wall visually square-ish (cells render bw x 0.72bw) so patterns stay readable
  cols = Math.min(13 + Math.floor(level / 3) * 2, 23);
  rows = Math.round(cols * 1.35);
  const nColors = Math.min(2 + Math.floor((level - 1) / 2), 5);

  const pool = ACCENTS.slice();
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  colors = [BG, ...pool.slice(0, nColors - 1)];
  goldIdx = colors.length;
  colors.push(GOLD_HEX);

  // paint a temporary row/col grid, then pour it into per-column stacks
  // sample in visual space (cells are bw x 0.72bw on screen) so the picture keeps its aspect
  const pat = PATTERNS[Math.floor(rng() * PATTERNS.length)];
  const vw = cols, vh = rows * 0.72;
  const span = Math.min(vw, vh) * 0.98;
  const sx = (vw - span) / 2, sy = (vh - span) / 2;
  const grid = [];
  for (let r = 0; r < rows; r++) {
    grid.push(new Array(cols));
    for (let c = 0; c < cols; c++) {
      const px = Math.floor(((c + 0.5) - sx) / span * 16);
      const py = Math.floor(((r + 0.5) * 0.72 - sy) / span * 16);
      grid[r][c] = (px >= 0 && px < 16 && py >= 0 && py < 16 && pat[py][px] === '#') ? 1 : 0;
    }
  }
  // extra accents: border ring, then scattered blobs
  if (nColors >= 3) {
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
      if (r === 0 || r === rows - 1 || c === 0 || c === cols - 1) grid[r][c] = 2;
  }
  for (let ci = 3; ci < nColors; ci++) {
    const nb = 3 + Math.floor(rng() * 3);
    for (let i = 0; i < nb; i++) {
      const bc = 1 + rng() * (cols - 2), br = 1 + rng() * (rows - 2), rad = 1.3 + rng() * 1.3;
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
        if ((c - bc) * (c - bc) + (r - br) * (r - br) < rad * rad) grid[r][c] = ci;
    }
  }
  // a gold vein cutting across everything — bonus coins, any octopus can eat it
  {
    const slope = (rng() < .5 ? 1 : -1) * (0.6 + rng() * 0.8);
    const k = cols * (0.25 + rng() * 0.5) - (slope < 0 ? slope * rows : 0);
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
      if (Math.abs(c - (k + slope * r)) < 1.1) grid[r][c] = goldIdx;
  }

  stacks = []; claimedN = []; dropOff = []; dropVel = [];
  colorLeft = new Array(colors.length).fill(0);
  for (let c = 0; c < cols; c++) {
    const st = [];
    for (let r = rows - 1; r >= 0; r--) { // bottom of the stack first
      st.push({ ci: grid[r][c], sh: (rng() - .5) * 0.05 });
      colorLeft[grid[r][c]]++;
    }
    stacks.push(st); claimedN.push(0); dropOff.push(0); dropVel.push(0);
  }
  remaining = rows * cols;

  coins = START_COINS;
  over = ''; stuckT = 0;
  pads = new Array(PAD_COUNT).fill(null);
  active = []; balls = []; particles = []; confetti = [];

  lanes = [];
  for (let ci = 0; ci < goldIdx; ci++) {
    const ln = { color: ci, items: [] };
    for (let i = 0; i < LANE_LEN; i++) ln.items.push(genLaneItem(ci));
    lanes.push(ln);
  }

  levelLabel.textContent = 'Level ' + level;
  overlay.classList.remove('show');
  layout();
  kick();
}

function genLaneItem(color) {
  let ammo = 30 + Math.floor(rngQ() * 46);
  const need = colorLeft[color] + Math.ceil(colorLeft[goldIdx] / 2);
  ammo = Math.max(12, Math.min(ammo, need || 12));
  const price = Math.max(8, Math.ceil(ammo * 0.45));
  return { color, ammo, price, x: -100, y: H + 100, shake: 0 };
}

/* ---------- layout ---------- */
function layout() {
  dpr = window.devicePixelRatio || 1;
  W = stage.clientWidth; H = stage.clientHeight;
  cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const wallH = H * 0.52;
  bw = Math.min((W - 20) / cols, wallH / (0.72 * rows + 0.55));
  bd = bw * 0.72; bf = bw * 0.55;
  wallX = (W - cols * bw) / 2;
  baseY = 14 + rows * bd;

  padR = Math.min(30, W / (PAD_COUNT * 2.6), H * 0.045);
  padY = baseY + bf + padR + Math.max(16, H * 0.028);
  const padSpan = Math.min(W - 2 * (padR * 1.4 + 10), PAD_COUNT * padR * 2.7);
  padXs = [];
  for (let i = 0; i < PAD_COUNT; i++)
    padXs.push(W / 2 + (i - (PAD_COUNT - 1) / 2) * padSpan / (PAD_COUNT - 1 || 1));

  laneTop = padY + padR + Math.max(12, H * 0.018);
  const laneCount = goldIdx;
  const laneW = Math.min(96, (W - 16) / laneCount);
  laneXs = [];
  for (let i = 0; i < laneCount; i++)
    laneXs.push(W / 2 + (i - (laneCount - 1) / 2) * laneW);
  octoR = Math.min(30, laneW * 0.36, (H - laneTop) * 0.11);
  laneTop += octoR * 0.5; // keep lane-front price tags clear of the pad octopi
  laneStep = Math.min(octoR * 2.35, (H - laneTop - octoR * 2.2) / Math.max(1, LANE_LEN - 1));

  lanes.forEach((ln, li) => ln.items.forEach((q, i) => { const p = lanePos(li, i); q.x = p.x; q.y = p.y; }));
  for (const o of active) {
    if (o.pad >= 0) { o.tx = padXs[o.pad]; o.ty = padY; if (o.state === 'pad') { o.x = o.tx; o.y = o.ty; } }
  }
  draw();
}
function lanePos(li, idx) {
  return { x: laneXs[li], y: laneTop + octoR + idx * laneStep };
}

/* ---------- targeting ---------- */
// the next unclaimed brick of a column (balls always chew from the bottom up)
function columnNext(c) {
  return stacks[c][claimedN[c]] || null;
}
function eatableColors() { // colors that could act right now (gold counts for everyone)
  const set = new Set();
  for (let c = 0; c < cols; c++) { const b = columnNext(c); if (b) set.add(b.ci); }
  return set;
}
function canAct(color, set) { return set.has(color) || set.has(goldIdx); }
function findTarget(o) {
  let best = null, bd2 = Infinity;
  for (let c = 0; c < cols; c++) {
    const b = columnNext(c);
    if (!b || (b.ci !== o.color && b.ci !== goldIdx)) continue;
    const p = brickPos(c, claimedN[c]);
    const d2 = (p.x - o.x) * (p.x - o.x) + (p.y - o.y) * (p.y - o.y);
    if (d2 < bd2) { bd2 = d2; best = { c, x: p.x, y: p.y }; }
  }
  return best;
}
function brickPos(c, idx) { // center of the brick idx steps up from the bottom of column c
  return { x: wallX + (c + 0.5) * bw, y: baseY - dropOff[c] - (idx + 1) * bd + bd * 0.5 + bf * 0.5 };
}

/* ---------- actions ---------- */
function buy(li) {
  if (over) return;
  const ln = lanes[li];
  const item = ln.items[0];
  if (!item) return;
  const free = pads.indexOf(null);
  if (free === -1 || coins < item.price) {
    item.shake = 0.4;
    if (coins < item.price) coinFlash = 0.6;
    kick();
    return;
  }
  coins -= item.price;
  const o = { color: item.color, ammo: item.ammo, state: 'toPad', pad: free,
              x: item.x, y: item.y, fx: item.x, fy: item.y, tx: padXs[free], ty: padY,
              t: 0, cool: 0.15, bob: Math.random() * 6.28, inflight: 0, shake: 0, idle: 0 };
  pads[free] = o;
  active.push(o);
  ln.items.shift();
  if (colorLeft[ln.color] > 0) ln.items.push(genLaneItem(ln.color)); // the column marches up
  kick();
}
function destroyBottom(c, earn) {
  const b = stacks[c].shift();
  if (!b) return;
  remaining--; colorLeft[b.ci]--;
  if (earn) coins += b.ci === goldIdx ? GOLD_COINS : 1;
  const p = { x: wallX + (c + 0.5) * bw, y: baseY - dropOff[c] - bd * 0.5 + bf * 0.5 };
  const color = colors[b.ci];
  const burst = b.ci === goldIdx ? 10 : 7;
  for (let i = 0; i < burst; i++) {
    const a = Math.random() * 6.28, s = 60 + Math.random() * 160;
    particles.push({ x: p.x, y: p.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60,
                     life: 0.5 + Math.random() * 0.3, t: 0, size: bw * (0.14 + Math.random() * 0.2), color });
  }
  if (stacks[c].length) dropOff[c] += bd; // the stack above falls down to the line
  if (remaining === 0) endGame(true);
}
function endGame(win) {
  over = win ? 'win' : 'lose';
  if (win) {
    for (let i = 0; i < 120; i++)
      confetti.push({ x: Math.random() * W, y: -20 - Math.random() * H * 0.5,
                      vx: (Math.random() - .5) * 60, vy: 120 + Math.random() * 180,
                      rot: Math.random() * 6.28, vr: (Math.random() - .5) * 8,
                      size: 5 + Math.random() * 7,
                      color: colors[1 + Math.floor(Math.random() * (colors.length - 1))] });
  }
  setTimeout(() => {
    ovEmoji.textContent = win ? '🐙' : '🔒';
    ovMsg.textContent = win ? 'Wall Cleared!' : 'Stuck!';
    ovSub.textContent = win ? `Level ${level} demolished with ${coins} coins to spare.`
                            : 'Every launcher is jammed on a color it can’t reach, and nothing useful is affordable. Commit your octopi more carefully!';
    ovBtn.textContent = win ? 'Next Level' : 'Retry';
    overlay.classList.add('show');
  }, win ? 900 : 600);
  kick();
}

/* ---------- simulation ---------- */
function tick(dt) {
  let activity = confetti.length > 0 || balls.length > 0 || particles.length > 0 || active.length > 0;
  if (coinFlash > 0) { coinFlash -= dt; activity = true; }

  // stacks thump down under gravity
  for (let c = 0; c < cols; c++) {
    if (dropOff[c] > 0) {
      dropVel[c] += DROP_G * dt;
      dropOff[c] -= dropVel[c] * dt;
      if (dropOff[c] <= 0) { dropOff[c] = 0; dropVel[c] = 0; }
      activity = true;
    }
  }

  for (const ln of lanes) {
    ln.items.forEach((q, i) => {
      if (q.shake > 0) { q.shake -= dt; activity = true; }
      const p = lanePos(lanes.indexOf(ln), i);
      if (Math.abs(q.x - p.x) + Math.abs(q.y - p.y) > 0.5) activity = true;
      q.x += (p.x - q.x) * Math.min(1, dt * 10);
      q.y += (p.y - q.y) * Math.min(1, dt * 10);
    });
  }

  for (let i = active.length - 1; i >= 0; i--) {
    const o = active[i];
    if (o.shake > 0) o.shake -= dt;
    if (o.state === 'toPad') {
      o.t += dt / 0.4;
      if (o.t >= 1) { o.x = o.tx; o.y = o.ty; o.state = 'pad'; }
      else {
        const e = easeInOut(o.t);
        o.x = o.fx + (o.tx - o.fx) * e;
        o.y = o.fy + (o.ty - o.fy) * e - Math.sin(o.t * Math.PI) * 46;
      }
    } else if (o.state === 'pad') {
      o.bob += dt * 7;
      if (over) continue;
      o.cool -= dt;
      if (o.cool <= 0 && o.ammo > 0) {
        const tg = findTarget(o);
        if (!tg) o.idle += dt;
        if (tg) {
          o.idle = 0;
          o.cool = FIRE_INTERVAL;
          claimedN[tg.c]++;
          o.ammo--; o.inflight++;
          const sx = o.x, sy = o.y - octoR * 1.5;
          const dist = Math.hypot(tg.x - sx, tg.y - sy);
          balls.push({ sx, sy, tx: tg.x, ty: tg.y,
                       cx: (sx + tg.x) / 2 + (sx < tg.x ? -1 : 1) * dist * 0.12, cy: (sy + tg.y) / 2,
                       t: 0, dur: Math.max(0.16, dist / BALL_SPEED),
                       color: colors[o.color], c: tg.c, o });
        }
      }
      // spent, or bored (nothing it can shoot for a while): hop off the pad and dive away.
      // idle time is the cost of committing an octopus whose color isn't reachable.
      if (o.inflight === 0 && (o.ammo <= 0 || o.idle > 5)) {
        o.state = 'dying'; o.vy = -340;
        pads[o.pad] = null; o.pad = -1;
      }
    } else if (o.state === 'dying') {
      o.vy += 1500 * dt; o.y += o.vy * dt;
      if (o.y - octoR * 2 > H) active.splice(i, 1);
    }
  }

  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    b.t += dt / b.dur;
    const t = Math.min(1, b.t), u = 1 - t;
    b.x = u * u * b.sx + 2 * u * t * b.cx + t * t * b.tx;
    b.y = u * u * b.sy + 2 * u * t * b.cy + t * t * b.ty;
    if (!b.trail) b.trail = [];
    b.trail.push(b.x, b.y);
    if (b.trail.length > 12) b.trail.splice(0, 2);
    if (b.t >= 1) {
      b.o.inflight--;
      claimedN[b.c]--;
      destroyBottom(b.c, true);
      balls.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += dt;
    if (p.t >= p.life) { particles.splice(i, 1); continue; }
    p.vy += 500 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
  }

  for (let i = confetti.length - 1; i >= 0; i--) {
    const f = confetti[i];
    f.y += f.vy * dt; f.x += f.vx * dt + Math.sin(f.y * 0.02) * 40 * dt; f.rot += f.vr * dt;
    if (f.y > H + 30) confetti.splice(i, 1);
  }

  // stuck check: any octopus with ammo will either fire or give up and free its pad,
  // so the game is only lost when the board is static and nothing useful is buyable
  if (!over && balls.length === 0 && remaining > 0) {
    const busy = active.some(o => o.state === 'toPad' || (o.state === 'pad' && o.ammo > 0));
    if (busy) stuckT = 0;
    else {
      const eat = eatableColors();
      const freePad = pads.indexOf(null) !== -1;
      const buyable = freePad && lanes.some(ln =>
        ln.items.length && coins >= ln.items[0].price && canAct(ln.color, eat));
      stuckT = buyable ? 0 : stuckT + dt;
      if (stuckT > 1.5) { stuckT = 0; endGame(false); }
    }
    activity = true;
  }
  return activity;
}

/* ---------- drawing ---------- */
function drawWall() {
  const gap = Math.max(1, bw * 0.06);
  for (let c = 0; c < cols; c++) {
    const st = stacks[c];
    const x = wallX + c * bw;
    const yb = baseY - dropOff[c];
    for (let i = st.length - 1; i >= 0; i--) {
      const b = st[i];
      const base = colors[b.ci];
      const y = yb - (i + 1) * bd;
      if (i === 0) { // exposed front face at the eating line
        ctx.fillStyle = shade(base, -0.42 + b.sh);
        ctx.fillRect(x, y + bd, bw - gap, bf);
        ctx.fillStyle = 'rgba(255,255,255,.10)';
        ctx.fillRect(x, y + bd, bw - gap, Math.max(1, bf * 0.12));
      }
      ctx.fillStyle = shade(base, 0.06 + b.sh);
      ctx.fillRect(x, y, bw - gap, bd - gap);
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      ctx.fillRect(x, y, bw - gap, Math.max(1, bd * 0.14));
      if (b.ci === goldIdx) {
        ctx.fillStyle = 'rgba(255,255,255,.45)';
        ctx.fillRect(x + bw * 0.18, y + bd * 0.22, Math.max(1.5, bw * 0.1), Math.max(1.5, bw * 0.1));
      }
    }
  }
}

function drawOcto(o, r, dim) {
  const x = o.x + (o.shake > 0 ? Math.sin(o.shake * 55) * 5 : 0);
  let y = o.y, sc = 1, alpha = dim ? 0.45 : 1;
  if (o.state === 'pad') { y += Math.sin(o.bob) * 2.5; sc = 1.12; }
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y); ctx.scale(sc, sc);
  const col = colors[o.color];
  const outline = shade(col, -0.45);
  // legs: little bumps peeking out under the body
  ctx.fillStyle = shade(col, -0.22);
  for (let i = -1.5; i <= 1.5; i++) {
    ctx.beginPath();
    ctx.arc(i * r * 0.5, r * 0.78, r * 0.22, 0, 6.29);
    ctx.fill();
  }
  // body: dome head, slightly narrower at the bottom
  const grd = ctx.createRadialGradient(-r * 0.35, -r * 0.55, r * 0.15, 0, -r * 0.1, r * 1.35);
  grd.addColorStop(0, shade(col, 0.32));
  grd.addColorStop(1, shade(col, -0.06));
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(-r * 0.82, r * 0.72);
  ctx.bezierCurveTo(-r * 1.12, r * 0.05, -r * 0.95, -r * 1.05, 0, -r * 1.05);
  ctx.bezierCurveTo(r * 0.95, -r * 1.05, r * 1.12, r * 0.05, r * 0.82, r * 0.72);
  ctx.closePath();
  ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.strokeStyle = outline;
  ctx.stroke();
  // eyes + smile
  const ey = -r * 0.16, ex = r * 0.36;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-ex, ey, r * 0.24, 0, 6.29); ctx.arc(ex, ey, r * 0.24, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#1c1d26';
  ctx.beginPath(); ctx.arc(-ex, ey, r * 0.115, 0, 6.29); ctx.arc(ex, ey, r * 0.115, 0, 6.29); ctx.fill();
  ctx.strokeStyle = '#1c1d26';
  ctx.lineWidth = Math.max(1, r * 0.07);
  ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.22, 0.35, Math.PI - 0.35); ctx.stroke();
  // ammo badge, tucked under the chin
  if (o.state !== 'dying') {
    const txt = String(o.ammo);
    ctx.font = `800 ${Math.round(r * 0.52)}px system-ui, sans-serif`;
    const tw = ctx.measureText(txt).width;
    const bwd = tw + r * 0.5, bh = r * 0.6, by = r * 0.86;
    ctx.fillStyle = 'rgba(255,255,255,.96)';
    ctx.beginPath(); ctx.roundRect(-bwd / 2, by - bh / 2, bwd, bh, bh / 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#1c1d26';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(txt, 0, by + r * 0.02);
  }
  ctx.restore();
}

function drawPriceTag(q, r) {
  const ok = coins >= q.price;
  const x = q.x + (q.shake > 0 ? Math.sin(q.shake * 55) * 5 : 0) + r * 0.95;
  const y = q.y - r * 1.05;
  const txt = String(q.price);
  ctx.font = `800 ${Math.round(r * 0.48)}px system-ui, sans-serif`;
  const tw = ctx.measureText(txt).width;
  const bh = r * 0.62, bwd = tw + bh * 1.25;
  ctx.fillStyle = ok ? '#f7b733' : '#5b5e6b';
  ctx.beginPath(); ctx.roundRect(x - bh * 0.55, y - bh / 2, bwd, bh, bh / 2); ctx.fill();
  ctx.fillStyle = ok ? '#8a5a00' : '#2c2d36';
  ctx.beginPath(); ctx.arc(x, y, bh * 0.3, 0, 6.29); ctx.fill();
  ctx.fillStyle = ok ? '#3d2a00' : '#c9ccd8';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, x + bh * 0.42, y + 1);
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  drawWall();

  // pads
  const eat = over ? new Set() : eatableColors();
  for (let i = 0; i < PAD_COUNT; i++) {
    ctx.fillStyle = 'rgba(255,255,255,.12)';
    ctx.beginPath();
    ctx.ellipse(padXs[i], padY + padR * 0.55, padR * 1.25, padR * 0.5, 0, 0, 6.29);
    ctx.fill();
  }

  // balls
  for (const b of balls) {
    ctx.strokeStyle = 'rgba(255,255,255,.5)';
    ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    if (b.trail && b.trail.length >= 4) {
      ctx.beginPath();
      ctx.moveTo(b.trail[0], b.trail[1]);
      for (let i = 2; i < b.trail.length; i += 2) ctx.lineTo(b.trail[i], b.trail[i + 1]);
      ctx.stroke();
    }
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, Math.max(3, bw * 0.16), 0, 6.29); ctx.fill();
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // octopus lanes: one marching column per color, front octopus buyable
  lanes.forEach((ln, li) => {
    for (let i = ln.items.length - 1; i >= 0; i--) {
      const q = ln.items[i];
      if (i === 0) {
        const affordable = coins >= q.price;
        // strict hint: glow only when this octopus's own color is on the eating line
        if (!over && affordable && eat.has(ln.color)) {
          ctx.fillStyle = 'rgba(255,255,255,.16)';
          ctx.beginPath();
          ctx.ellipse(q.x, q.y + octoR * 0.95, octoR * 1.35, octoR * 0.5, 0, 0, 6.29);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,.5)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
        drawOcto(q, octoR, !affordable);
        drawPriceTag(q, octoR);
      } else {
        drawOcto(q, octoR * 0.92, true);
      }
    }
  });

  // octopi on pads / in flight
  for (const o of active) drawOcto(o, octoR * 1.06, false);

  // coin counter
  {
    const r = 11;
    const txt = String(coins);
    ctx.font = `800 17px system-ui, sans-serif`;
    const tw = ctx.measureText(txt).width;
    const x = 12, y = 16, h = 30;
    ctx.fillStyle = coinFlash > 0 && Math.sin(coinFlash * 25) > 0 ? 'rgba(255,77,87,.85)' : 'rgba(0,0,0,.55)';
    ctx.beginPath(); ctx.roundRect(x, y, tw + h + 14, h, h / 2); ctx.fill();
    ctx.fillStyle = '#f7b733';
    ctx.beginPath(); ctx.arc(x + h / 2 + 2, y + h / 2, r, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#8a5a00';
    ctx.beginPath(); ctx.arc(x + h / 2 + 2, y + h / 2, r * 0.55, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(txt, x + h + 4, y + h / 2 + 1);
  }

  // confetti
  for (const f of confetti) {
    ctx.save();
    ctx.translate(f.x, f.y); ctx.rotate(f.rot);
    ctx.fillStyle = f.color;
    ctx.fillRect(-f.size / 2, -f.size / 3, f.size, f.size * 0.66);
    ctx.restore();
  }
}

/* ---------- loop ---------- */
function frame(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000 || 0.016);
  lastT = t;
  const activity = tick(dt);
  draw();
  if (activity) rafId = requestAnimationFrame(frame);
  else rafId = 0;
}
function kick() {
  if (!rafId) { lastT = performance.now(); rafId = requestAnimationFrame(frame); }
}

/* ---------- input ---------- */
cv.addEventListener('pointerdown', e => {
  if (over) return;
  const rect = cv.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  // octopi on launchers are committed — a tap just makes them wiggle
  for (const o of active) {
    if (o.state !== 'pad') continue;
    if (Math.hypot(x - o.x, y - o.y) < octoR * 1.7) { o.shake = 0.35; kick(); return; }
  }
  // lane fronts: tap to buy
  let best = -1, bd2 = Infinity;
  lanes.forEach((ln, li) => {
    if (!ln.items.length) return;
    const q = ln.items[0];
    const d2 = (x - q.x) * (x - q.x) + (y - q.y) * (y - q.y);
    if (d2 < bd2) { bd2 = d2; best = li; }
  });
  if (best >= 0 && bd2 < (octoR * 2.1) ** 2) buy(best);
});

ovBtn.addEventListener('click', () => {
  if (over === 'win') { level++; localStorage.setItem('octoBlastLevel', level); }
  genLevel();
});
document.getElementById('restartBtn').addEventListener('click', genLevel);
window.addEventListener('resize', layout);

genLevel();
</script>
</body>
</html>
